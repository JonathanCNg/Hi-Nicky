<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hi Nicky!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fce4ec, #f3e5f5, #e8eaf6, #e0f7fa);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .bean {
      font-size: 5rem;
      animation: bounce 2s ease-in-out infinite;
      display: inline-block;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      color: #e91e63;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
      margin: 1rem 0;
      animation: popIn 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55) both;
    }

    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .sparkles {
      font-size: 2rem;
      animation: spin 3s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.2); }
      100% { transform: rotate(360deg) scale(1); }
    }

    .hearts {
      margin-top: 1.5rem;
      font-size: 1.5rem;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    .hint {
      margin-top: 2.5rem;
      font-size: 1rem;
      color: #b39ddb;
      letter-spacing: 0.05em;
      animation: fadeHint 2s ease-in-out infinite alternate;
    }

    @keyframes fadeHint {
      0% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    .cat {
      position: fixed;
      font-size: 3rem;
      pointer-events: none;
      z-index: 999;
      animation: catFloat 2s ease-out forwards;
    }

    @keyframes catFloat {
      0% {
        transform: scale(0) rotate(0deg);
        opacity: 1;
      }
      50% {
        transform: scale(1.3) rotate(15deg);
        opacity: 1;
      }
      100% {
        transform: scale(0.8) rotate(-10deg) translateY(-120px);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="bean">🫘</div>
    <h1>
      <span class="sparkles">✨</span>
      NICKY IS THE COOLEST HUMAN BEAN EVER
      <span class="sparkles">✨</span>
    </h1>
    <div class="hearts">💖🌈💖🌈💖</div>
    <p class="hint">🐾 click or tap anywhere for a surprise 🐾</p>
  </div>
  <script>
    const cats = ['🐱', '😺', '😸', '😻', '🐈', '🐈‍⬛', '😽', '🙀', '😹', '😿'];
    document.addEventListener('click', (e) => {
      const cat = document.createElement('div');
      cat.className = 'cat';
      cat.textContent = cats[Math.floor(Math.random() * cats.length)];
      cat.style.left = (e.clientX - 24) + 'px';
      cat.style.top = (e.clientY - 24) + 'px';
      document.body.appendChild(cat);
      cat.addEventListener('animationend', () => cat.remove());
    });
  </script>
</body>
</html>
